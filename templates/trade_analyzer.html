<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Analyzer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231a1a1a' rx='4'/><line x1='7' y1='5' x2='7' y2='27' stroke='%2322ab94' stroke-width='1.5'/><rect x='4' y='12' width='6' height='10' fill='%2322ab94' rx='0.5'/><line x1='16' y1='7' x2='16' y2='25' stroke='%23ef5350' stroke-width='1.5'/><rect x='13' y='10' width='6' height='9' fill='%23ef5350' rx='0.5'/><line x1='25' y1='6' x2='25' y2='26' stroke='%2322ab94' stroke-width='1.5'/><rect x='22' y='13' width='6' height='9' fill='%2322ab94' rx='0.5'/></svg>">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #121212;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Main layout ─────────────────────────────────────────── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Trade list (left panel) ─────────────────────────────── */
.trade-list {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #2a2a2a;
  overflow: hidden;
}

.list-header {
  display: grid;
  grid-template-columns: 80px 1fr 40px 70px;
  padding: 6px 10px;
  background: #1e1e1e;
  border-bottom: 1px solid #333;
  color: #888;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.list-header span {
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 3px;
  transition: color 0.1s;
}
.list-header span:hover { color: #bbb; }
.list-header span.sort-active { color: #ccc; }
.month-separator {
  padding: 4px 10px;
  background: #1a1a1a;
  border-top: 1px solid #2a2a2a;
  color: #666;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.list-body {
  overflow-y: auto;
  flex: 1;
}
.list-body::-webkit-scrollbar { width: 4px; }
.list-body::-webkit-scrollbar-track { background: #1a1a1a; }
.list-body::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

.trade-row {
  display: grid;
  grid-template-columns: 80px 1fr 40px 70px;
  padding: 7px 10px;
  cursor: pointer;
  border-bottom: 1px solid #1f1f1f;
  transition: background 0.1s;
  align-items: center;
}
.trade-row:hover { background: #202020; }
.trade-row.selected {
  background: #1a3a52;
  border-left: 2px solid #4a9eff;
}

.col-month { color: #888; font-size: 11px; }
.col-day { color: #aaa; font-size: 11px; }
.col-ticker { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 5px; }
.col-ticker .status-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.open { background: #f0a500; }
.status-dot.closed { background: transparent; }
.col-pnl { text-align: right; font-size: 12px; font-variant-numeric: tabular-nums; }
.pnl-pos { color: #22ab94; }
.pnl-neg { color: #ef5350; }
.pnl-neutral { color: #888; }

/* ── Chart area (right panel) ────────────────────────────── */
.chart-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #161616;
}

.chart-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: #1e1e1e;
  border-bottom: 1px solid #2a2a2a;
  flex-shrink: 0;
}
.chart-title { font-size: 13px; color: #bbb; }
.chart-title span { color: #4a9eff; font-weight: 600; }

.btn {
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  color: #ccc;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.15s;
}
.btn:hover { background: #383838; }
.btn.active { background: #1a3a52; border-color: #4a9eff; color: #4a9eff; }

.chart-placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #444;
  font-size: 14px;
}

/* ── 2×2 chart grid ──────────────────────────────────────── */
.chart-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 2px;
  background: #0d0d0d;
  overflow: hidden;
}

.chart-panel {
  background: #161616;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chart-panel-label {
  padding: 4px 8px;
  font-size: 11px;
  color: #666;
  background: #1a1a1a;
  border-bottom: 1px solid #222;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.chart-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.chart-spinner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 24px;
  height: 24px;
  border: 2px solid #2a2a2a;
  border-top-color: #4a9eff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  z-index: 10;
  pointer-events: none;
}
@keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

/* ── Fullscreen backdrop ─────────────────────────────────── */
.fs-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.fs-backdrop.open { display: flex; }

.fs-modal {
  background: #161616;
  border: 1px solid #333;
  border-radius: 6px;
  width: 96vw;
  height: 94vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.fs-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: #1e1e1e;
  border-bottom: 1px solid #2a2a2a;
  flex-shrink: 0;
}
.fs-title { font-size: 14px; color: #ccc; }
.fs-title span { color: #4a9eff; font-weight: 600; }
.btn-close {
  background: none;
  border: none;
  color: #888;
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  padding: 0 4px;
}
.btn-close:hover { color: #fff; }

.fs-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 2px;
  background: #0d0d0d;
  overflow: hidden;
}
</style>
</head>
<body>

<div class="layout">

  <!-- Left: trade list -->
  <div class="trade-list">
    <div class="list-header" id="list-header"></div>
    <div class="list-body" id="list-body"></div>
  </div>

  <!-- Right: chart area -->
  <div class="chart-area">
    <div class="chart-toolbar">
      <div class="chart-title" id="chart-title">Select a trade to view charts</div>
      <div style="display:flex;gap:6px">
        <button class="btn" id="hourly-btn" onclick="toggleHourly()">Hourly</button>
        <button class="btn" id="fs-btn" onclick="openFullscreen()" style="display:none">⛶ Fullscreen</button>
      </div>
    </div>
    <div id="chart-placeholder" class="chart-placeholder">← Click a trade row</div>
    <div id="chart-grid" class="chart-grid" style="display:none">
      <div class="chart-panel">
        <div class="chart-panel-label" id="lbl-daily-ticker">Daily — </div>
        <div class="chart-container" id="cc-daily-ticker"></div>
      </div>
      <div class="chart-panel">
        <div class="chart-panel-label" id="lbl-hourly-ticker">Hourly — </div>
        <div class="chart-container" id="cc-hourly-ticker"></div>
      </div>
      <div class="chart-panel" style="grid-column: 1 / -1">
        <div class="chart-panel-label" id="lbl-daily-bench">Daily — </div>
        <div class="chart-container" id="cc-daily-bench"></div>
      </div>
    </div>
  </div>

</div>

<!-- Fullscreen popup -->
<div class="fs-backdrop" id="fs-backdrop">
  <div class="fs-modal">
    <div class="fs-header">
      <div class="fs-title" id="fs-title">Charts</div>
      <button class="btn-close" onclick="closeFullscreen()">✕</button>
    </div>
    <div class="fs-grid" id="fs-grid">
      <div class="chart-panel">
        <div class="chart-panel-label" id="fs-lbl-daily-ticker">Daily — </div>
        <div class="chart-container" id="fs-cc-daily-ticker"></div>
      </div>
      <div class="chart-panel">
        <div class="chart-panel-label" id="fs-lbl-hourly-ticker">Hourly — </div>
        <div class="chart-container" id="fs-cc-hourly-ticker"></div>
      </div>
      <div class="chart-panel" style="grid-column: 1 / -1">
        <div class="chart-panel-label" id="fs-lbl-daily-bench">Daily — </div>
        <div class="chart-container" id="fs-cc-daily-bench"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Injected data ─────────────────────────────────────────────────────────────
const TRADES              = {{ trades_json|safe }};
const BENCHMARK           = {{ benchmark_json|safe }};
const MIN_HOURLY_CANDLES  = {{ min_hourly_candles }};
const TZ_OFFSET_SECS      = {{ tz_offset_secs }};

const INDICATOR_COLORS = {
  SMA10: '#4a9eff', SMA20: '#9c27b0', SMA50: '#ff9800',
  EMA20: '#ff69b4', EMA65: '#4a9eff', EMA130: '#9c27b0',
};

// ── State ─────────────────────────────────────────────────────────────────────
let selectedIdx   = -1;
let activeSeries  = {};   // { id: { chart, series } }
let fsActive      = false;
const renderGen   = { '': 0, 'fs-': 0 };
let sortCol       = 'date';
let sortDir       = 'asc';
let sortedIndices = [];
let showHourly    = localStorage.getItem('ta:show-hourly') !== 'false';

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtPnl(usd, pct) {
  if (usd == null) return { text: '—', cls: 'pnl-neutral' };
  const sign = usd >= 0 ? '+' : '';
  const cls  = usd >= 0 ? 'pnl-pos' : 'pnl-neg';
  return { text: `${sign}$${usd.toFixed(2)}`, cls };
}

// ── Sort ──────────────────────────────────────────────────────────────────────
const SORT_DEFAULTS = { date: 'asc', ticker: 'asc', qty: 'desc', pnl: 'desc' };

function getSortedIndices() {
  const indices = TRADES.map((_, i) => i);
  if (sortCol === 'date') {
    return sortDir === 'asc' ? indices : indices.reverse();
  }
  return indices.sort((a, b) => {
    const ta = TRADES[a], tb = TRADES[b];
    let va, vb;
    if      (sortCol === 'ticker') { va = ta.ticker;              vb = tb.ticker; }
    else if (sortCol === 'qty')    { va = ta.qty;                 vb = tb.qty; }
    else if (sortCol === 'pnl')    { va = ta.pnl_usd ?? -Infinity; vb = tb.pnl_usd ?? -Infinity; }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });
}

function onSortClick(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = SORT_DEFAULTS[col];
  }
  renderHeader();
  renderList();
}

// ── Build trade list ──────────────────────────────────────────────────────────
function renderHeader() {
  const cols = [
    { key: 'date',   label: 'Day',   style: '' },
    { key: 'ticker', label: 'Ticker', style: '' },
    { key: 'qty',    label: 'Qty',   style: 'justify-self:end;flex-direction:row-reverse' },
    { key: 'pnl',    label: 'P&amp;L', style: 'justify-self:end;flex-direction:row-reverse' },
  ];
  document.getElementById('list-header').innerHTML = cols.map(col => {
    const isActive = sortCol === col.key;
    const icon     = isActive ? (sortDir === 'asc' ? '↑' : '↓') : '⇅';
    const iconStyle = `font-size:9px;${isActive ? 'color:#4a9eff' : 'opacity:0.25'}`;
    return `<span class="${isActive ? 'sort-active' : ''}" style="${col.style}" onclick="onSortClick('${col.key}')">
      ${col.label}<span style="${iconStyle}">${icon}</span>
    </span>`;
  }).join('');
}

function renderList() {
  sortedIndices = getSortedIndices();
  const showSeparators = sortCol === 'date' && sortDir === 'asc';
  const body = document.getElementById('list-body');
  body.innerHTML = '';
  let lastMonth = null;

  sortedIndices.forEach(origIdx => {
    const t = TRADES[origIdx];

    if (showSeparators && t.month_label !== lastMonth) {
      const sep = document.createElement('div');
      sep.className = 'month-separator';
      sep.textContent = t.month_label;
      body.appendChild(sep);
      lastMonth = t.month_label;
    }

    const pnl = fmtPnl(t.pnl_usd);
    const row = document.createElement('div');
    row.className = 'trade-row' + (origIdx === selectedIdx ? ' selected' : '');
    row.dataset.idx = origIdx;

    const dotCls      = t.status === 'OPEN' ? 'open' : 'closed';
    const tickerColor = t.is_long ? '#22ab94' : '#ef5350';
    row.innerHTML = `
      <span class="col-day">${t.day_label}</span>
      <span class="col-ticker" style="color:${tickerColor}">
        <span class="status-dot ${dotCls}"></span>${t.ticker}
      </span>
      <span style="text-align:right;font-size:11px;color:#888">${t.qty}</span>
      <span class="col-pnl ${pnl.cls}">${pnl.text}</span>`;

    row.addEventListener('click', () => selectTrade(origIdx));
    body.appendChild(row);
  });

  const closedTrades = TRADES.filter(t => t.pnl_usd != null);
  const netPnl  = closedTrades.reduce((sum, t) => sum + t.pnl_usd, 0);
  const netCls  = netPnl >= 0 ? 'pnl-pos' : 'pnl-neg';
  const netText = (netPnl >= 0 ? '+' : '') + '$' + netPnl.toFixed(2);
  const summary = document.createElement('div');
  summary.className = 'trade-row';
  summary.style.cssText = 'border-top:1px solid #444;cursor:default';
  summary.innerHTML = `
    <span class="col-day" style="color:#888;font-size:11px">Total</span>
    <span class="col-ticker" style="color:#aaa">${TRADES.length} trades</span>
    <span></span>
    <span class="col-pnl ${netCls}">${netText}</span>`;
  body.appendChild(summary);
}

// ── Select a trade ────────────────────────────────────────────────────────────
function selectTrade(idx) {
  if (idx < 0 || idx >= TRADES.length) return;

  // Deselect old
  if (selectedIdx >= 0) {
    const old = document.querySelector(`.trade-row[data-idx="${selectedIdx}"]`);
    if (old) old.classList.remove('selected');
  }
  selectedIdx = idx;
  const row = document.querySelector(`.trade-row[data-idx="${idx}"]`);
  if (row) {
    row.classList.add('selected');
    row.scrollIntoView({ block: 'nearest' });
  }

  const t = TRADES[idx];
  updateChartTitle(t);

  document.getElementById('chart-placeholder').style.display = 'none';
  document.getElementById('chart-grid').style.display = '';
  document.getElementById('fs-btn').style.display = '';

  renderAllCharts(t, false);
  if (fsActive) renderAllCharts(t, true);
}

function updateChartTitle(t) {
  const pnl = fmtPnl(t.pnl_usd, t.pnl_pct);
  const pnlColor  = pnl.cls === 'pnl-pos' ? '#22ab94' : pnl.cls === 'pnl-neg' ? '#ef5350' : '#888';
  const side      = t.is_long ? 'LONG' : 'SHORT';
  const sideColor = t.is_long ? '#22ab94' : '#ef5350';
  document.getElementById('chart-title').innerHTML =
    `<span>${t.ticker}</span>
     &nbsp;<span style="color:${sideColor};font-size:11px;font-weight:600">${side}</span>
     &nbsp;<span style="color:#888;font-size:11px">${t.qty} shares</span>
     &nbsp;<span style="color:#666;font-size:11px">${t.open_date}</span>
     &nbsp;<span style="color:#666;font-size:11px">(${t.duration})</span>
     &nbsp;<span style="color:${pnlColor};font-size:12px;font-weight:600">${pnl.text}</span>`;
  const fsTitle = document.getElementById('fs-title');
  fsTitle.innerHTML = document.getElementById('chart-title').innerHTML;
}

// ── Keyboard navigation ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const pos     = sortedIndices.indexOf(selectedIdx);
    const nextPos = e.key === 'ArrowDown' ? pos + 1 : pos - 1;
    if (nextPos >= 0 && nextPos < sortedIndices.length) selectTrade(sortedIndices[nextPos]);
  }
  if (e.key === 'Escape' && fsActive) closeFullscreen();
});

// ── Fullscreen ────────────────────────────────────────────────────────────────
function openFullscreen() {
  fsActive = true;
  document.getElementById('fs-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (selectedIdx >= 0) renderAllCharts(TRADES[selectedIdx], true);
}

function closeFullscreen() {
  fsActive = false;
  document.getElementById('fs-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  destroyChartsInScope('fs-');
}

document.getElementById('fs-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('fs-backdrop')) closeFullscreen();
});

// ── Chart rendering ───────────────────────────────────────────────────────────
const CHART_OPTIONS = {
  layout: { background: { color: '#161616' }, textColor: '#888' },
  grid: { vertLines: { color: '#1f1f1f' }, horzLines: { color: '#1f1f1f' } },
  crosshair: { mode: 1 },
  rightPriceScale: { borderColor: '#2a2a2a' },
  timeScale: { borderColor: '#2a2a2a', timeVisible: true, secondsVisible: false },
  handleScroll: true,
  handleScale: true,
};

function showSpinner(el) {
  const s = document.createElement('div');
  s.className = 'chart-spinner';
  el.appendChild(s);
}

function hideSpinner(el) {
  el.querySelector('.chart-spinner')?.remove();
}

function resizeAllCharts() {
  Object.values(activeSeries).forEach(({ chart, el }) => {
    chart.resize(el.clientWidth, el.clientHeight);
  });
}

function applyHourlyVisibility(prefix) {
  const h = activeSeries[prefix + 'hourly-ticker'];
  const dataOk = !!(h) && h.count >= MIN_HOURLY_CANDLES;
  const visible = showHourly && dataOk;
  const gridEl = document.getElementById(prefix ? 'fs-grid' : 'chart-grid');
  document.getElementById(`${prefix}cc-hourly-ticker`).closest('.chart-panel').style.display =
    visible ? '' : 'none';
  gridEl.style.gridTemplateColumns = visible ? '' : '1fr';
  document.getElementById('hourly-btn').classList.toggle('active', showHourly);
  requestAnimationFrame(resizeAllCharts);
}

function toggleHourly() {
  showHourly = !showHourly;
  localStorage.setItem('ta:show-hourly', showHourly);
  applyHourlyVisibility('');
  if (fsActive) applyHourlyVisibility('fs-');
}

function destroyChartsInScope(prefix) {
  ['daily-ticker','hourly-ticker','daily-bench'].forEach(id => {
    const key = prefix + id;
    if (activeSeries[key]) {
      try { activeSeries[key].chart.remove(); } catch(_) {}
      delete activeSeries[key];
    }
  });
}

async function renderAllCharts(trade, fullscreen) {
  const prefix = fullscreen ? 'fs-' : '';
  destroyChartsInScope(prefix);
  const gen = ++renderGen[prefix];

  const ids = ['daily-ticker','hourly-ticker','daily-bench'];
  const configs = [
    { ticker: trade.ticker, isHourly: false },
    { ticker: trade.ticker, isHourly: true  },
    { ticker: BENCHMARK,    isHourly: false },
  ];

  // Update labels
  document.getElementById(`${prefix}lbl-daily-ticker`).textContent  = `Daily — ${trade.ticker}`;
  document.getElementById(`${prefix}lbl-hourly-ticker`).textContent = `Hourly — ${trade.ticker}`;
  document.getElementById(`${prefix}lbl-daily-bench`).textContent   = `Daily — ${BENCHMARK}`;

  await Promise.all(ids.map(async (id, i) => {
    const cfg     = configs[i];
    const el      = document.getElementById(`${prefix}cc-${id}`);
    const from     = cfg.isHourly ? trade.hourly_from : trade.daily_from;
    const to       = cfg.isHourly ? trade.hourly_to   : trade.daily_to;
    showSpinner(el);
    const response = await fetchCandles(cfg.ticker, cfg.isHourly, from, to);
    hideSpinner(el);

    if (renderGen[prefix] !== gen) return;
    if (!response || response.candles.length === 0) return;
    const candles = response.candles;

    const chart = LightweightCharts.createChart(el, {
      ...CHART_OPTIONS, width: el.clientWidth, height: el.clientHeight,
    });

    const series = chart.addCandlestickSeries({
      upColor:          '#22ab94',
      downColor:        '#ef5350',
      borderUpColor:    '#22ab94',
      borderDownColor:  '#ef5350',
      wickUpColor:      '#22ab94',
      wickDownColor:    '#ef5350',
      priceLineVisible: false,
    });

    const data = candles.map(c => ({
      time:  cfg.isHourly ? c.time : utcTimestampToDate(c.time),
      open:  c.open,
      high:  c.high,
      low:   c.low,
      close: c.close,
    }));
    series.setData(data);

    // Volume
    const volSeries = chart.addHistogramSeries({
      priceScaleId: 'vol', priceFormat: { type: 'volume' },
      lastValueVisible: false, priceLineVisible: false,
    });
    chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });
    volSeries.setData(candles.map((c, i) => ({
      time:  data[i].time,
      value: c.volume,
      color: c.close >= c.open ? '#26a69a44' : '#ef535044',
    })));

    // Indicators (computed server-side)
    Object.entries(response.indicators).forEach(([name, points]) => {
      if (!points.length) return;
      const color = INDICATOR_COLORS[name] || '#888';
      const s = chart.addLineSeries({ color, lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
      s.setData(points.map(p => ({ time: cfg.isHourly ? p.time : utcTimestampToDate(p.time), value: p.value })));
    });

    const markers = buildMarkers(trade, cfg.isHourly);
    if (markers.length > 0) series.setMarkers(markers);

    try {
      const from = cfg.isHourly ? trade.hourly_from + TZ_OFFSET_SECS : utcTimestampToDate(trade.daily_from);
      const to   = cfg.isHourly ? trade.hourly_to   + TZ_OFFSET_SECS : utcTimestampToDate(trade.daily_to);
      chart.timeScale().setVisibleRange({ from, to });
    } catch(_) {
      chart.timeScale().fitContent();
    }

    activeSeries[prefix + id] = { chart, series, count: data.length, el };
  }));

  if (renderGen[prefix] !== gen) return;

  applyHourlyVisibility(prefix);
}

// ── Marker builders ───────────────────────────────────────────────────────────
function buildMarkers(trade, isHourly) {
  const markers = [];
  const entryColor = trade.is_long ? '#22ab94' : '#ef5350';
  const exitColor  = trade.is_long ? '#ef5350' : '#22ab94';

  // Entries: one per fill, no dedup
  const entryList = isHourly ? trade.entry_markers_hourly : trade.entry_markers;
  for (const m of entryList) {
    markers.push({
      time:     isHourly ? m.time : utcTimestampToDate(m.time),
      position: trade.is_long ? 'belowBar' : 'aboveBar',
      color:    entryColor,
      shape:    trade.is_long ? 'arrowUp' : 'arrowDown',
      text:     `E +${m.qty} @${m.price.toFixed(2)}`,
      size:     1,
    });
  }

  // Exits: deduped by day (daily chart) or by hour (hourly chart)
  const exitList = isHourly ? trade.exit_markers_hourly : trade.exit_markers_daily;
  for (const m of exitList) {
    markers.push({
      time:     isHourly ? m.time : utcTimestampToDate(m.time),
      position: trade.is_long ? 'aboveBar' : 'belowBar',
      color:    exitColor,
      shape:    trade.is_long ? 'arrowDown' : 'arrowUp',
      text:     `X ${m.qty} @${m.price.toFixed(2)}`,
      size:     1,
    });
  }

  // lightweight-charts requires markers sorted by time
  markers.sort((a, b) => {
    const ta = typeof a.time === 'string' ? a.time : a.time;
    const tb = typeof b.time === 'string' ? b.time : b.time;
    return ta < tb ? -1 : ta > tb ? 1 : 0;
  });

  return markers;
}

// Convert a UTC unix timestamp to a "YYYY-MM-DD" string for daily charts
function utcTimestampToDate(ts) {
  const d = new Date(ts * 1000);
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, '0');
  const day = String(d.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// ── Candle fetch with simple in-memory cache ──────────────────────────────────
const candleCache = {};

async function fetchCandles(ticker, isHourly, from, to) {
  const key = `${ticker}:${isHourly}:${from}:${to}`;
  if (candleCache[key]) return candleCache[key];

  const type = isHourly ? 'hourly' : 'daily';
  const url  = `/api/candles/${type}/${ticker}?from=${from}&to=${to}`;

  try {
    const resp = await fetch(url);
    if (!resp.ok) return null;
    const data = await resp.json();
    candleCache[key] = data;
    return data;
  } catch(e) {
    console.error('Failed to fetch candles:', e);
    return null;
  }
}

window.addEventListener('resize', resizeAllCharts);

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('hourly-btn').classList.toggle('active', showHourly);
renderHeader();
renderList();
if (TRADES.length > 0) selectTrade(sortedIndices[0]);
