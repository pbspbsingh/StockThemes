<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='5' fill='%231a1a1a'/><path d='M7 9h18M7 16h18M7 23h12' stroke='%234a9eff' stroke-width='2' stroke-linecap='round'/><circle cx='10' cy='9' r='3' fill='%232ecc71'/><circle cx='20' cy='16' r='3' fill='%23f39c12'/><circle cx='14' cy='23' r='3' fill='%23e74c3c'/></svg>">
<title>Tag Management</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    height: 100vh;
    overflow: hidden;
    background: #1a1a1a;
    color: #d0d0d0;
    font-size: 13px;
}

.container {
    display: grid;
    grid-template-columns: 270px 430px minmax(520px, 1fr);
    height: 100vh;
    gap: 1px;
    background: #0a0a0a;
}

.column {
    background: #1e1e1e;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
}

.column-header {
    background: #2d2d2d;
    color: #e0e0e0;
    padding: 10px;
    min-height: 42px;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 4px rgba(0,0,0,.3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.header-actions { display: flex; align-items: center; gap: 5px; }
.header-count { color: #777; font-size: 11px; font-weight: 600; }

.toolbar {
    padding: 8px 10px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    gap: 6px;
    flex-shrink: 0;
}

.toolbar.vertical {
    flex-direction: column;
}

.list {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #3a3a3a transparent;
}
.list::-webkit-scrollbar { width: 4px; }
.list::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 2px; }

.item {
    padding: 8px 10px;
    cursor: pointer;
    border-bottom: 1px solid #2a2a2a;
    transition: background 0.15s;
    color: #d0d0d0;
}
.item:hover { background: #252525; }
.item.selected {
    background: #1a3a52;
    border-left: 3px solid #4a9eff;
    padding-left: 7px;
}

.category-heading {
    min-height: 28px;
    padding: 6px 10px;
    border-bottom: 1px solid #242424;
    background: #191919;
    color: #8f8f8f;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 1;
}
.category-heading .count {
    min-width: 22px;
    padding: 1px 6px;
    border: 1px solid #3a3a3a;
    border-radius: 10px;
    background: #222;
    color: #d0d0d0;
    font-size: 10px;
    font-weight: 700;
    text-align: center;
}
.category-heading span:first-child {
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}
.category-heading + .item { border-top: none; }

.tag-row, .stock-row-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.tag-name, .ticker {
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    font-weight: 600;
}

.ticker { color: #e0e0e0; letter-spacing: 0.2px; }
.count { color: #666; font-size: 11px; flex-shrink: 0; }

.stock-tags {
    margin-top: 5px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
}

.chip {
    display: inline-flex;
    align-items: center;
    max-width: 190px;
    gap: 4px;
    padding: 2px 6px;
    border-radius: 10px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #c8c8c8;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
}
.chip span {
    overflow: hidden;
    text-overflow: ellipsis;
}
.chip.new { border-color: #4a9eff; color: #9dccff; }
.chip.warn { border-color: #f39c12; color: #f2c16b; }
.chip button {
    border: none;
    background: transparent;
    color: #777;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
}
.chip button:hover { color: #e74c3c; }

.available-tags {
    gap: 6px;
}
.available-tags .chip {
    cursor: pointer;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 12px;
}
.available-tags .chip:hover {
    background: #1a3a52;
    border-color: #4a9eff;
    color: #fff;
}
.available-tags .chip.disabled {
    cursor: default;
    opacity: 0.35;
    color: #777;
    border-color: #2a2a2a;
}
.available-tags .chip.disabled:hover {
    background: #1a1a1a;
    border-color: #2a2a2a;
    color: #777;
}

.tag-input-box {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 5px;
    flex: 1;
    min-width: 260px;
    min-height: 32px;
    padding: 4px;
    background: #111;
    border: 1px solid #333;
    border-radius: 4px;
}
.tag-input-box:focus-within { border-color: #4a9eff; }
.tag-input-box input {
    flex: 1;
    min-width: 150px;
    border: none;
    background: transparent;
    padding: 3px 4px;
}
.tag-input-box input:focus { border: none; }
.pending-tags {
    display: contents;
}
.tag-suggestions {
    margin: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-content: flex-start;
}
.tag-suggestions:not(:empty) {
    margin: 5px 0 8px;
}
.tag-suggestions .chip {
    cursor: pointer;
    max-width: 190px;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
}
.tag-suggestions .chip:hover {
    background: #1a3a52;
    border-color: #4a9eff;
    color: #fff;
}
.model-suggestion-body {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 40px;
}
.model-suggestion-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 32px;
    align-content: flex-start;
    align-items: flex-start;
}
.model-suggestion-meta {
    color: #777;
    font-size: 11px;
    text-align: right;
}

.prompt-options {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin: 10px 0 8px;
    color: #b6b6b6;
    font-size: 12px;
}
.prompt-options label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
}
.prompt-options input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: #4a9eff;
}

#ai-prompt {
    width: 100%;
    min-height: 380px;
    resize: none;
    margin-top: 8px;
    line-height: 1.45;
}

.no-tags { color: #666; font-size: 11px; }

.btn, .icon-btn {
    background: #2a2a2a;
    color: #cfcfcf;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.btn { padding: 5px 9px; }
.icon-btn {
    width: 24px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.btn:hover, .icon-btn:hover { background: #333; color: #fff; border-color: #555; }
.btn.primary { background: #1a3a52; border-color: #4a9eff; color: #9dccff; }
.btn.danger:hover, .icon-btn.danger:hover { background: #4a1f1f; border-color: #e74c3c; color: #fff; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-clear {
    display: inline-block;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 600;
    background: #2a2a2a;
    color: #888;
    border: 1px solid #3a3a3a;
    border-radius: 3px;
    cursor: pointer;
    line-height: 16px;
    transition: color 0.2s, opacity 0.2s;
}
.btn-clear:hover:not(:disabled) { color: #d0d0d0; }
.btn-clear:disabled { opacity: 0.3; cursor: not-allowed; }

.toggle {
    display: flex;
    gap: 2px;
    background: #111;
    border-radius: 4px;
    padding: 2px;
}
.toggle button {
    padding: 4px 9px;
    border: none;
    background: transparent;
    color: #888;
    font-size: 11px;
    line-height: 1;
    font-weight: 600;
    cursor: pointer;
    border-radius: 3px;
}
.toggle button:hover { color: #d0d0d0; }
.toggle button.active { background: #4a9eff; color: #fff; }

input, textarea, select {
    background: #111;
    color: #d0d0d0;
    border: 1px solid #333;
    border-radius: 4px;
    font: inherit;
    outline: none;
}
input { padding: 6px 8px; min-width: 0; }
textarea {
    width: 100%;
    min-height: 210px;
    resize: vertical;
    padding: 9px;
    line-height: 1.45;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
}
input:focus, textarea:focus, select:focus { border-color: #4a9eff; }
select { padding: 5px 8px; }

.search-wrap {
    display: flex;
    gap: 5px;
    width: 100%;
    align-items: stretch;
}
.search-wrap .search { flex: 1; }
.search-clear {
    width: 28px;
    height: auto;
    min-height: 30px;
    flex-shrink: 0;
    padding: 0;
    line-height: 1;
}
.inline-form {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 6px;
}
.inline-form select {
    grid-column: 1 / -1;
    width: 100%;
}
.inline-form input { min-width: 0; }

.work {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 14px;
}

.section { margin-bottom: 18px; }
.section-title {
    color: #4a9eff;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
}
.section-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
}
.section-title-row .section-title { margin-bottom: 0; }
.ticker-summary {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #2a2a2a;
}
.ticker-summary-main {
    min-width: 0;
}
.ticker-summary-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
    margin-top: 6px;
}
.tag-work-grid {
    display: grid;
    grid-template-columns: minmax(300px, 1fr) minmax(260px, 0.85fr);
    gap: 0;
    align-items: start;
    padding: 12px;
    margin-bottom: 18px;
    border: 1px solid #333;
    border-radius: 4px;
    background: #1b1b1b;
}
.tag-work-grid.single {
    grid-template-columns: 1fr;
}
.tag-work-grid .section {
    margin-bottom: 0;
}
.editor-section {
    min-width: 0;
    padding-right: 18px;
}
.editor-section .tag-input-box {
    width: 100%;
}
.editor-actions {
    justify-content: flex-end;
}
.suggestion-section {
    min-width: 0;
    padding-left: 18px;
    border-left: 1px solid #333;
}
.profile-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
    margin-bottom: 7px;
}
.profile-summary {
    color: #d0d0d0;
    font-size: 13px;
    line-height: 1.5;
}
.profile-status {
    margin-bottom: 7px;
    color: #888;
    font-size: 12px;
}
.profile-error {
    color: #ffaaaa;
}

.selected-title {
    font-size: 22px;
    color: #e5e5e5;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.muted { color: #777; font-size: 12px; }

.row-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.row-actions input { flex: 1; min-width: 260px; }
.edit-tag-controls { margin-bottom: 8px; }
.edit-tag-actions, .suggestion-actions { justify-content: flex-start; }

.toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    z-index: 1000;
    max-width: min(420px, calc(100vw - 28px));
    padding: 10px 12px;
    background: #202020;
    border: 1px solid #3a3a3a;
    border-left: 3px solid #4a9eff;
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    color: #dcdcdc;
    font-size: 12px;
    line-height: 1.35;
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%) translateY(12px);
    transition: opacity 0.18s ease, transform 0.18s ease;
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
.toast.error { background: #231616; border-color: #5a2a2a; border-left-color: #e74c3c; color: #ffaaaa; }
.toast.ok { background: #172116; border-color: #2d4a2b; border-left-color: #2ecc71; color: #b8e6c5; }

.stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin: 8px 0 10px;
}
.stat {
    color: #888;
    font-size: 12px;
}
.stat b { color: #e0e0e0; }

.preview-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}
.preview-table th {
    color: #4a9eff;
    text-align: left;
    padding: 7px 8px;
    border-bottom: 2px solid #4a9eff;
}
.preview-table td {
    padding: 7px 8px;
    border-bottom: 1px solid #2a2a2a;
    vertical-align: top;
}
.preview-table .num { text-align: right; color: #aaa; white-space: nowrap; }

.copy-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
}

.errors {
    border: 1px solid #5a2a2a;
    background: #231616;
    color: #ffaaaa;
    padding: 8px;
    border-radius: 4px;
    margin-top: 8px;
}
.errors div + div { margin-top: 4px; }

@media (max-width: 1180px) {
    .tag-work-grid {
        grid-template-columns: 1fr;
    }
    .editor-section {
        padding-right: 0;
    }
    .suggestion-section {
        margin-top: 14px;
        padding-top: 14px;
        padding-left: 0;
        border-left: none;
        border-top: 1px solid #333;
    }
}

</style>
</head>
<body data-controller="tags-page" data-tags-page-tag-suggestion-enabled-value="{{ tag_suggestion_enabled|json|safe }}">
<div class="container">
    <aside class="column" data-controller="tag-list">
        <div class="column-header">
            <span>Tags</span>
            <div class="header-actions">
                <span class="header-count" id="tag-count" data-tag-list-target="count"></span>
                <button class="btn-clear" id="clear-selected-tags" title="Clear selected tags" disabled data-tag-list-target="clearSelection" data-action="click->tag-list#clearSelectedTags">Clear</button>
                <button class="icon-btn" id="add-category-btn" title="Add category" data-action="click->tag-list#toggleNewCategoryForm">⊞</button>
                <button class="icon-btn" id="add-tag-btn" title="Add tag" data-action="click->tag-list#toggleNewTagForm">+</button>
            </div>
        </div>
        <div class="toolbar vertical">
            <div class="search-wrap">
                <input class="search" id="tag-search" placeholder="Search tags" data-tag-list-target="search" data-action="input->tag-list#render">
                <button class="icon-btn search-clear" id="clear-tag-search" title="Clear tag search" data-action="click->tag-list#clearTagSearch">×</button>
            </div>
            <div class="inline-form" id="new-category-form" style="display:none" data-tag-list-target="newCategoryForm">
                <input id="new-category-name" placeholder="New category name" data-tag-list-target="newCategoryName" data-action="keydown->tag-list#maybeCreateCategory">
                <button class="btn primary" id="save-new-category" data-action="click->tag-list#createCategory">Add</button>
            </div>
            <div class="inline-form" id="new-tag-form" style="display:none" data-tag-list-target="newTagForm">
                <select id="new-tag-category" data-tag-list-target="newTagCategory"></select>
                <input id="new-tag-name" placeholder="New tag name" data-tag-list-target="newTagName" data-action="keydown->tag-list#maybeCreateTag">
                <button class="btn primary" id="save-new-tag" data-action="click->tag-list#createTag">Add</button>
            </div>
        </div>
        <div class="list" id="tag-list" data-tag-list-target="list"></div>
    </aside>

    <main class="column" data-controller="stock-list">
        <div class="column-header">
            <span id="stocks-title" data-stock-list-target="title">Stocks</span>
            <span class="header-count" id="stock-count" data-stock-list-target="count"></span>
        </div>
        <div class="toolbar vertical">
            <div class="search-wrap">
                <input class="search" id="stock-search" placeholder="Search tickers or tags" data-stock-list-target="search" data-action="input->stock-list#render">
                <button class="icon-btn search-clear" id="clear-stock-search" title="Clear stock search" data-action="click->stock-list#clearStockSearch">×</button>
            </div>
        </div>
        <div class="list" id="stock-list" data-stock-list-target="list"></div>
    </main>

    <section class="column" data-controller="workspace">
        <div class="column-header">
            <span id="work-title" data-workspace-target="title">AI Tagging Workflow</span>
        </div>
        <div class="work" id="work" data-workspace-target="body"></div>
    </section>
</div>
<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true" data-tags-page-target="toast"></div>

<script id="tags-data" type="application/json">{{ tags_json|safe }}</script>
<script id="categories-data" type="application/json">{{ categories_json|safe }}</script>
<script id="stocks-data" type="application/json">{{ stocks_json|safe }}</script>
<script id="untagged-data" type="application/json">{{ untagged_json|safe }}</script>

<script type="module" src="/assets/tags_mgmt/application.js"></script>
</body>
</html>
